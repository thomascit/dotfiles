# Options to make tmux more pleasant
set -g default-shell $SHELL
set -g base-index 1
set -g mouse on
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g detach-on-destroy off
set -g pane-border-lines heavy

# Move tmux to top
set-option -g status-position top

# Terminal and color support
set -g default-terminal "tmux-256color"

# Enable truecolor for common TERM values, including nested tmux over SSH
set -ga terminal-overrides ",*256col*:Tc,tmux-256color:Tc,screen-256color:Tc"

# Set vi mode keys
setw -g mode-keys vi

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

# Dracula Config
set -g @dracula-show-left-icon '#S | #H'
set -g @dracula-plugins 'cpu-usage ram-usage uptime ssh-session'
set -g @dracula-cpu-usage-label ''
set -g @dracula-ram-usage-label ''
set -g @dracula-uptime-label ''
set -g @dracula-cpu-usage-colors 'green dark_gray'
set -g @dracula-ram-usage-colors 'green dark_gray'
set -g @dracula-uptime-colors 'green dark_gray'
set -g @dracula-ssh-session-colors 'red dark_gray'
set -g @dracula-show-empty-plugins false
set -g @dracula-show-ssh-only-when-connected true
set -g @dracula-border-contrast true
set -g @dracula-left-pad ''
set -g @dracula-right-pad ''

# Vim Navigator Key Bindings
set -g @vim_navigator_mapping_left 'C-h'
set -g @vim_navigator_mapping_right 'C-l'
set -g @vim_navigator_mapping_up 'C-k'
set -g @vim_navigator_mapping_down 'C-j'
set -g @vim_navigator_mapping_prev 'C-\\'

# For Yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Custom Key Bindings
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Popups
# F  — SSH picker
bind F display-popup -E \
    -x C -y C \
    -T " SSH " -b heavy -w 40% -h 30% \
    "sh -c 'host=\$(grep -E \"^Host \" ~/.ssh/config | awk \"{print \\\$2}\" | grep -v \"^\\\*\$\" | fzf --prompt=\"ssh > \" --height=100%) && [ -n \"\$host\" ] && tmux new-window \"ssh \$host\"'"

# v  — fzf file picker → open in $EDITOR in a new window
bind v display-popup -E \
    -x C -y C \
    -T " Open File " -b heavy -w 50% -h 40% \
    -d "#{pane_current_path}" \
    "sh -c 'file=\$(fzf) && [ -n \"\$file\" ] && tmux new-window \"\${EDITOR:-nvim} \$file\"'"

# C-s  — session switcher
bind C-s display-popup -E \
    -x C -y C \
    -T " Sessions " -b heavy -w 40% -h 25% \
    "sh -c 'tmux list-sessions -F \"#{session_name}\" | fzf | xargs -r tmux switch-client -t'"

# O  — OpenCode (continue last session)
bind O new-window -c "#{pane_current_path}" 'opencode --continue'

# r  — popup terminal
bind r display-popup -E \
    -x C -y C \
    -T " Terminal " -b heavy -w 60% -h 50% \
    -d "#{pane_current_path}"

# S  — new session from ~/Projects picker
bind S display-popup -E \
    -x C -y C \
    -T " New Session " -b heavy -w 40% -h 30% \
    -d "#{pane_current_path}" \
    "sh -c 'name=\$(ls -1 ~/Projects/ 2>/dev/null | fzf) && [ -n \"\$name\" ] && dir=~/Projects/\"\$name\" && (tmux new-session -d -s \"\$name\" -c \"\$dir\" 2>/dev/null || true) && tmux switch-client -t \"\$name\"'"

# N  — Neovim in current path
bind N new-window -c "#{pane_current_path}" 'nvim'

# V  — Neovim in current path (alternate)
bind V new-window -c "#{pane_current_path}" 'nvim'

# ?  — key bindings reference (sectioned, with headers)
bind ? display-popup -E \
    -x C -y C \
    -T " Key Bindings " -b heavy -w 50% -h 70% \
    "printf '%s\n' \
        '── Popups ─────────────────────────────' \
        '  prefix + F     SSH host picker' \
        '  prefix + v     File picker → \$EDITOR' \
        '  prefix + s     Session switcher' \
        '  prefix + r     Popup terminal' \
        '  prefix + S     New session from ~/Projects' \
        '  prefix + C-c   Config file picker' \
        '  prefix + ?     This help popup' \
        '' \
        '── New Windows ─────────────────────────' \
        '  prefix + O     OpenCode (continue)' \
        '  prefix + N/V   Neovim (current path)' \
        '  prefix + f     Yazi file manager' \
        '  prefix + g     Lazygit' \
        '  prefix + p     btop' \
        '  prefix + a     cmatrix' \
        '  prefix + c     New window (current path)' \
        '  prefix + C     New named window' \
        '' \
        '── Pane Splits ─────────────────────────' \
        '  prefix + -     Horizontal split' \
        '  prefix + _     Vertical split' \
        '  prefix + o     Vertical split 40% (OpenCode)' \
        '  prefix + t     Horizontal split 25%' \
        '' \
        '── Pane Navigation ─────────────────────' \
        '  C-h/j/k/l      Move between panes (vim-style)' \
        '  C-\\            Previous pane' \
        '  prefix + H/J/K/L  Resize pane' \
        '' \
        '── Windows ─────────────────────────────' \
        '  M-h / M-l      Prev / next window' \
        '  S-Left/Right   Swap window left / right' \
        '  prefix + W     Rename window to cwd' \
        '' \
        '── Sessions ────────────────────────────' \
        '  prefix + \$     Rename session (tmux default)' \
        '' \
        '── Toggles ─────────────────────────────' \
        '  prefix + b     Toggle status bar' \
        '  prefix + B     Toggle pane border status' \
        '  prefix + T     Toggle status position' \
        '' \
        '── Kill ────────────────────────────────' \
        '  prefix + x     Kill pane' \
        '  prefix + &     Kill window' \
        '' \
        '── Copy Mode (vi) ──────────────────────' \
        '  prefix + Space Enter copy mode' \
        '  v              Begin selection' \
        '  y              Yank   r  Rectangle toggle' \
        '' \
        '── Resurrect ───────────────────────────' \
        '  M-s  Save session    M-r  Restore session' \
    | fzf --no-sort --prompt='  ' --no-info --header='  prefix = C-Space' \
          --color='header:italic:yellow,gutter:-1' \
          "

# C-c  — fzf ~/.config file picker → open in $EDITOR (with bat preview)
bind C-c display-popup -E \
    -x C -y C \
    -T " Config " -b heavy -w 50% -h 40% \
    "sh -c 'file=\$(rg --files --hidden -L ~/.config/ | fzf --with-nth=-1 --delimiter=\"/\") && [ -n \"\$file\" ] && tmux new-window \"\${EDITOR:-nvim} \$file\"'"

# Split panes and new windows in current path
bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "Window name:" "new-window -n '%%'"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind o split-window -h -l 40% -c "#{pane_current_path}" "opencode --continue"
bind t split-window -v -l 25% -c "#{pane_current_path}"
bind f new-window 'yazi'
bind g new-window 'lazygit'
bind p new-window 'btop'
bind a new-window 'cmatrix -s'

# Rename window to current directory
bind C-w rename-window "#{b:pane_current_path}"
bind C-S rename-session "#{b:pane_current_path}"

# Toggle status bar visibility
bind b set -g status

# Toggle pane border status
bind B set -g pane-border-status

# Toggle status bar position between top and bottom
bind T if-shell 'tmux show-option -gv status-position | grep -q top' \
    'set-option -g status-position bottom' \
    'set-option -g status-position top'

# Pane border format
set -g pane-border-format "[#{pane_current_command}]"

# Popup border color (Dracula comment/dark_purple)
set -g popup-border-style "fg=#6272a4"


# Kill pane/window without confirmation
bind x kill-pane
bind & kill-window

# Resize panes with HJKL under prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
bind Space copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Move windows left/right
bind -n S-Left swap-window -t -1 \; select-window -t -1
bind -n S-Right swap-window -t +1 \; select-window -t +1

# Navigate to previous/next window
bind -n M-l next-window
bind -n M-h previous-window

# Sesh
bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.config/tmux/plugins/tpm/tpm
