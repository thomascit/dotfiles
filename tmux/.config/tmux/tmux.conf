# Options to make tmux more pleasant
set -g default-shell $SHELL
set -g base-index 1
set -g mouse on
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g detach-on-destroy off
set -g pane-border-lines heavy

# Move tmux to top
set-option -g status-position top

# Terminal and color support
set -g default-terminal "tmux-256color"

# Enable truecolor for common TERM values, including nested tmux over SSH
set -ga terminal-overrides ",*256col*:Tc,tmux-256color:Tc,screen-256color:Tc"

# Set vi mode keys
setw -g mode-keys vi

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect options
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'

# Continuum options
#set -g @continuum-boot 'on'
set -g @continuum-restore 'on'

# Dracula Config
set -g @dracula-show-left-icon '#S | #H'
set -g @dracula-plugins 'cpu-usage ram-usage uptime ssh-session'
set -g @dracula-cpu-usage-label ''
set -g @dracula-ram-usage-label ''
set -g @dracula-uptime-label ''
set -g @dracula-cpu-usage-colors 'green dark_gray'
set -g @dracula-ram-usage-colors 'green dark_gray'
set -g @dracula-uptime-colors 'green dark_gray'
set -g @dracula-ssh-session-colors 'red dark_gray'
set -g @dracula-show-empty-plugins false
set -g @dracula-show-ssh-only-when-connected true
set -g @dracula-border-contrast true
set -g @dracula-left-pad ''
set -g @dracula-right-pad ''

# Vim Navigator Key Bindings
set -g @vim_navigator_mapping_left 'C-h'
set -g @vim_navigator_mapping_right 'C-l'
set -g @vim_navigator_mapping_up 'C-k'
set -g @vim_navigator_mapping_down 'C-j'
set -g @vim_navigator_mapping_prev 'C-\\'

# For Yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Custom Key Bindings
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Popups
# S  — SSH picker
bind S display-popup -E \
    -x C -y C \
    -T " SSH " -b heavy -w 40% -h 30% \
    "sh -c 'host=\$(grep -E \"^Host \" ~/.ssh/config | awk \"{print \\\$2}\" | grep -v \"^\\\*\$\" | fzf --prompt=\"ssh > \" --height=100%) && [ -n \"\$host\" ] && tmux new-window \"ssh \$host\"'"

# v  — fzf file picker → open in $EDITOR in a new window
bind v display-popup -E \
    -x C -y C \
    -T " Open File " -b heavy -w 50% -h 40% \
    -d "#{pane_current_path}" \
    "sh -c 'file=\$(fzf) && [ -n \"\$file\" ] && tmux new-window \"\${EDITOR:-nvim} \$file\"'"

# C-s  — session switcher
bind C-s display-popup -E \
    -x C -y C \
    -T " Sessions " -b heavy -w 40% -h 25% \
    "sh -c 'tmux list-sessions -F \"#{session_name}\" | fzf --prompt=\"session > \" | xargs -r tmux switch-client -t'"

# w  — window switcher
bind w display-popup -E \
    -x C -y C \
    -T " Windows " -b heavy -w 40% -h 25% \
    "sh -c 'tmux list-windows -F \"#{window_index}: #{window_name} (#{pane_current_command})\" | fzf --prompt=\"window > \" | cut -d: -f1 | xargs -r tmux select-window -t'"

# O  — OpenCode (continue last session)
bind O new-window -c "#{pane_current_path}" 'opencode'

# r  — run command (auto-closes on success, stays open on error)
bind r command-prompt -p "Run:" \
    "new-window -c '#{pane_current_path}' 'zsh -ic \"%%\"; ret=\$?; [ \$ret -ne 0 ] && { echo \"[Exit: \$ret] Press Enter...\"; read; }'"

# N  — Neovim in current path
bind N new-window -c "#{pane_current_path}" 'nvim'

# V  — Neovim in current path (alternate)
bind V new-window -c "#{pane_current_path}" 'nvim'

# ?  — key bindings reference (sesh-style fzf popup)
bind ? display-popup -E -B -w 40% -h 65% \
    "printf '%b\\n' \
    '' \
    '\\033[1;35m 󰋼  Popups\\033[0m' \
    '    \\033[36mprefix + v\\033[0m       File picker → \$EDITOR' \
    '    \\033[36mprefix + s\\033[0m       Session switcher (sesh)' \
    '    \\033[36mprefix + S\\033[0m       SSH host picker' \
    '    \\033[36mprefix + r\\033[0m       Run command' \
    '    \\033[36mprefix + C-c\\033[0m     Config file picker' \
    '    \\033[36mprefix + ?\\033[0m       This help' \
    '' \
    '\\033[1;35m 󰖲  New Windows\\033[0m' \
    '    \\033[36mprefix + O\\033[0m       OpenCode' \
    '    \\033[36mprefix + N/V\\033[0m     Neovim (current path)' \
    '    \\033[36mprefix + f\\033[0m       Yazi file manager' \
    '    \\033[36mprefix + g\\033[0m       Lazygit' \
    '    \\033[36mprefix + p\\033[0m       btop' \
    '    \\033[36mprefix + a\\033[0m       cmatrix' \
    '    \\033[36mprefix + c\\033[0m       New window (current path)' \
    '    \\033[36mprefix + C\\033[0m       New named window' \
    '' \
    '\\033[1;35m 󰯌  Pane Splits\\033[0m' \
    '    \\033[36mprefix + -\\033[0m       Horizontal split' \
    '    \\033[36mprefix + _\\033[0m       Vertical split' \
    '    \\033[36mprefix + o\\033[0m       Vertical split 40%% (OpenCode Continue)' \
    '    \\033[36mprefix + t\\033[0m       Horizontal split 25%%' \
    '' \
    '\\033[1;35m 󰁍  Pane Navigation\\033[0m' \
    '    \\033[36mC-h/j/k/l\\033[0m        Move between panes (vim-style)' \
    '    \\033[36mC-\\\\\\033[0m              Previous pane' \
    '    \\033[36mprefix + H/J/K/L\\033[0m Resize pane' \
    '' \
    '\\033[1;35m   Windows\\033[0m' \
    '    \\033[36mprefix + w\\033[0m       Window switcher (fzf)' \
    '    \\033[36mM-h / M-l\\033[0m        Prev / next window' \
    '    \\033[36mS-Left/Right\\033[0m     Swap window left / right' \
    '    \\033[36mprefix + C-w\\033[0m     Rename window to cwd' \
    '' \
    '\\033[1;35m 󱂬  Sessions\\033[0m' \
    '    \\033[36mprefix + \$\\033[0m       Rename session' \
    '' \
    '\\033[1;35m 󰔡  Toggles\\033[0m' \
    '    \\033[36mprefix + b\\033[0m       Toggle status bar' \
    '    \\033[36mprefix + B\\033[0m       Toggle pane border status' \
    '    \\033[36mprefix + T\\033[0m       Toggle status position' \
    '' \
    '\\033[1;35m 󰅖  Kill\\033[0m' \
    '    \\033[36mprefix + x\\033[0m       Kill pane' \
    '    \\033[36mprefix + &\\033[0m       Kill window' \
    '' \
    '\\033[1;35m 󰆏  Copy Mode (vi)\\033[0m' \
    '    \\033[36mprefix + Space\\033[0m   Enter copy mode' \
    '    \\033[36mv\\033[0m                Begin selection' \
    '    \\033[36my\\033[0m                Yank' \
    '    \\033[36mr\\033[0m                Rectangle toggle' \
    '' \
    '\\033[1;35m 󰁯  Resurrect\\033[0m' \
    '    \\033[36mM-s\\033[0m              Save session' \
    '    \\033[36mM-r\\033[0m              Restore session' \
    '' \
  | fzf --no-sort --ansi --border=rounded --border-label=' 󰌌 Key Bindings ' \
    --layout=reverse-list --prompt='🔍 ' --header='  prefix = C-Space  │  ESC to close' \
    --bind 'tab:down,btab:up' --height=100%"

# C-c  — fzf ~/.config file picker → open in $EDITOR (with bat preview)
bind C-c display-popup -E \
    -x C -y C \
    -T " Config " -b heavy -w 50% -h 40% \
    "sh -c 'file=\$(rg --files --hidden -L ~/.config/ | fzf --with-nth=-1 --delimiter=\"/\") && [ -n \"\$file\" ] && tmux new-window \"\${EDITOR:-nvim} \$file\"'"

# Split panes and new windows in current path
bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "Window name:" "new-window -n '%%'"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind o split-window -h -l 40% -c "#{pane_current_path}" "opencode --continue"
bind t split-window -v -l 25% -c "#{pane_current_path}"
bind m split-window -v -l 10% -c "#{pane_current_path}"
bind f new-window 'yazi'
bind g new-window 'lazygit'
bind p new-window 'btop'
bind a new-window 'cmatrix -s'

# Rename window to current directory
bind C-w rename-window "#{b:pane_current_path}"
bind C-s rename-session "#{b:pane_current_path}"

# Toggle status bar visibility
bind b set -g status

# Toggle pane border status
bind B set -g pane-border-status

# Toggle status bar position between top and bottom
bind T if-shell 'tmux show-option -gv status-position | grep -q top' \
    'set-option -g status-position bottom' \
    'set-option -g status-position top'

# Pane border format
set -g pane-border-format "[#{pane_current_command}]"

# Popup border color (Dracula comment/dark_purple)
set -g popup-border-style "fg=#6272a4"


# Kill pane/window without confirmation
bind x kill-pane
bind & kill-window

# Resize panes with HJKL under prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
bind Space copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Move windows left/right
bind -n S-Left swap-window -t -1 \; select-window -t -1
bind -n S-Right swap-window -t +1 \; select-window -t +1

# Navigate to previous/next window
bind -n M-l next-window
bind -n M-h previous-window

# Sesh
bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)'
)\""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.config/tmux/plugins/tpm/tpm
