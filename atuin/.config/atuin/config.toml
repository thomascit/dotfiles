# ─────────────────────────────────────────────
# Atuin — Shell History
# ─────────────────────────────────────────────

[sync]
records = true

[network]
# Sync address is set via ATUIN_SYNC_ADDRESS env var
# in ~/.zenv (zsh/bash) or ~/.fenv (fish)
# to avoid exposing the hostname in the public repo

[history]
filter_mode = "global"
filter_mode_shell_up_key_binding = "session"

[keys]
up_cursor_search = true
